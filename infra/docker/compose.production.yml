
include:
  - path: compose.core.internal.yml

services:
  ai-runtime:
    image: ${AI_RUNTIME_IMAGE:-ai-assistant-ai-runtime:latest}
    build:
      context: ../..
      dockerfile: services/ai-runtime/Dockerfile
    restart: unless-stopped
    pull_policy: always
    env_file:
      - ../../.env.production
    environment:
      AI_HOST: 0.0.0.0
      INTELLIGENCE_HOST: 0.0.0.0
      AI_PORT: 8000
      DATABASE_URL: postgresql://ai_assistant:ai_assistant@postgres:5432/ai_assistant
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  gateway:
    image: ${GATEWAY_IMAGE:-ai-assistant-gateway:latest}
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    restart: unless-stopped
    pull_policy: always
    env_file:
      - ../../.env.production
    environment:
      API_PORT: ${API_PORT:-10000}
      PORT: ${API_PORT:-10000}
      INTELLIGENCE_UPSTREAM_URL: http://ai-runtime:8000
      DATABASE_URL: postgresql://ai_assistant:ai_assistant@postgres:5432/ai_assistant
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
    ports:
      - "${API_PORT:-10000}:${API_PORT:-10000}"
    volumes:
      - gateway_data:/app/services/gateway/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-runtime:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.API_PORT||10000)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  gateway_data:
