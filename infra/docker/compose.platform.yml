# Platform services — run alongside compose.core.yml
# Usage: docker compose -f infra/docker/compose.core.yml -f infra/docker/compose.platform.yml up -d

services:
  tool-runtime:
    build:
      context: ../..
      dockerfile: services/tool-runtime/Dockerfile
    ports:
      - "3011:3011"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://ai_assistant:ai_assistant@postgres:5432/ai_assistant
      - INTEGRATION_ENCRYPTION_KEY=${INTEGRATION_ENCRYPTION_KEY}
    depends_on:
      - redis
      - postgres

  ingestion-engine:
    build:
      context: ../..
      dockerfile: services/ingestion-engine/Dockerfile
    ports:
      - "3012:3012"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://ai_assistant:ai_assistant@postgres:5432/ai_assistant
    depends_on:
      - redis
      - postgres

  whatsapp-bridge:
    build:
      context: ../..
      dockerfile: services/whatsapp-bridge/Dockerfile
    ports:
      - "3010:3010"
    deploy:
      resources:
        limits:
          memory: 512M

  ai-orchestrator:
    build:
      context: ../..
      dockerfile: services/ai-orchestrator/Dockerfile
    ports:
      - "3013:3013"
    environment:
      - TOOL_RUNTIME_URL=http://tool-runtime:3011
      - AI_SERVICE_URL=http://ai:8000
    depends_on:
      - tool-runtime
